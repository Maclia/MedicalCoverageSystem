version: '3.9'

# Monolithic Deployment Docker Compose
# This configuration runs the entire Medical Coverage System as a single
# backend server container, ideal for development and small-scale deployments.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mcs-postgres
    environment:
      POSTGRES_USER: mcs
      POSTGRES_PASSWORD: mcs
      POSTGRES_DB: mcs_meta
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mcs-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8081:80"
    depends_on:
      - postgres
    networks:
      - backend

  # Monolithic Backend Server
  monolith:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production
    container_name: mcs-server
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://mcs:mcs@postgres:5432/mcs_meta
      # Enable all features in monolith mode
      BILLING_ENABLED: "true"
      FINANCE_ENABLED: "true"
      HOSPITAL_ENABLED: "true"
      INSURANCE_ENABLED: "true"
      MEMBERSHIP_ENABLED: "true"
      CRM_ENABLED: "true"
      WELLNESS_ENABLED: "true"
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - backend
      - frontend

  # React Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mcs-client
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: http://monolith:3001
    ports:
      - "3000:80"
    depends_on:
      - monolith
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
