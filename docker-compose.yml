    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3009/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Nginx Reverse Proxy (Frontend + API Gateway behind single URL)
  nginx:
    image: nginx:alpine
    container_name: medical_nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # For HTTPS (production)
      - nginx_logs:/var/log/nginx
    networks:
      - medical-services-network
    depends_on:
      - frontend
      - api-gateway
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  frontend_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  medical-services-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
